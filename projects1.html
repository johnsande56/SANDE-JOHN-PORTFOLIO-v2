<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">
<title>Delicious Bites</title>
<link 
href="https://fonts.googleapis.com/css2?
family=pppins:wght@300;600$display=swap" rel="stylesheet">
<style>
body{
    margin: 0;
    font-family: 'poppins',sans-serif;

}
/*HERO*/
.hero{
    height:70vh;
    background: url('https://images.unsplash.com/photo-1555992336-03a23c9d0c4b')
    center/cover;
    display: flex;
    justify-content: center;
    align-items: centre;
    color:rgb(194, 58, 58);
    position: relative;

}
.hero::after{
    content: "";

    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
}
.hero h1{
    position: relative;
    font-size: 70px;
    display: flex;
justify-content: center;
align-items: center;
}
/*SECTION*/
section{
    padding: 60PX 20PX;
    text-align: center;
}
/*MENU*/
.menu{
    display: grid;
    gap: 20px;
    max-width: 600px;
    margin: auto;

}
.item{
    background: #8b9daf;
    padding: 20px;
    border-radius: 10px;

}
/*CONTACT*/
.contact{
    background: h0f172a;
    color: rgb(184, 46, 46);
}

</style>

</head>
<body>
<div class="hero">
    <h1>Delicious Bites</h1>
  
</div>
<section>
<h2>Our Menu</h2>
<div class="menu">
    <div class="item">Pizza-$10</div>
    <div class="item">Burger-$8</div>
    <div class="item">Pasta-$9</div>
</div>

</section>
<section class="contact">
<h2>Contact Us</h2>
<p>phone: +213 704693148</p>

</section>


</body>
</html>
